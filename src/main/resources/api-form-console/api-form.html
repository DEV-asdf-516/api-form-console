<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Form Console</title>
  <link rel="stylesheet" href="api-form.css">
</head>
<body>
<div class="wrap">
  <h1>API<span class="dot">::</span>FORM CONSOLE</h1>

  <!-- 설정 -->
  <div class="panel">
    <div class="cfg-grid">
      <label class="cfg">api-docs URL</label>
      <input type="text" id="docsUrl" placeholder="https://.../v3/api-docs">
      <button class="primary" id="btnLoad">스펙 불러오기</button>

      <label class="cfg">Base URL</label>
      <input type="text" id="baseUrl" placeholder="스펙 로드 후 자동 계산 (수정 가능)">
      <span></span>

      <label class="cfg">Authorization</label>
      <input type="text" id="authHeader" placeholder="Bearer eyJ... (비우면 헤더 미포함)">
      <span></span>
    </div>
    <div class="errbox hidden" id="loadErr"></div>
  </div>

  <!-- 엔드포인트 선택 -->
  <div class="panel hidden" id="epPanel">
    <p class="sec-title">Endpoint</p>
    <select id="epSelect"></select>
    <div class="reqline" style="margin-top:10px">
      <span class="badge" id="epMethod"></span>
      <span class="pathtxt" id="epPath"></span>
      <span class="summary" id="epSummary"></span>
    </div>
  </div>

  <!-- 파라미터 -->
  <div class="panel hidden" id="paramPanel">
    <p class="sec-title">Path / Query Parameters</p>
    <div id="paramRows"></div>
  </div>

  <!-- Request Body 폼 -->
  <div class="panel hidden" id="bodyPanel">
    <p class="sec-title">Request Body <span class="typehint">application/json — 빈 필드는 JSON에서 제외됩니다</span></p>
    <div id="bodyForm"></div>
    <div class="toolbar">
      <button id="btnPreview">JSON 미리보기</button>
      <button id="btnFillToggle">JSON 붙여넣기</button>
    </div>
    <div id="previewWrap" class="previewwrap hidden">
      <button id="btnCopy" class="copybtn hidden" title="복사" aria-label="JSON 복사"></button>
      <pre id="previewBox"></pre>
    </div>
    <div id="fillArea" class="hidden" style="margin-top:8px">
      <textarea id="fillJson" placeholder='JSON을 붙여넣고 "폼에 적용"을 누르세요. 스키마에 있는 필드만 채워집니다.'></textarea>
      <div class="toolbar">
        <button class="primary" id="btnFillApply">폼에 적용</button>
        <label style="font-size:12px;color:var(--muted);display:flex;gap:5px;align-items:center">
          <input type="checkbox" id="chkIncludeNulls"> 원본 JSON의 null 필드 포함 전송
        </label>
      </div>
    </div>
  </div>

  <!-- 전송 -->
  <div class="panel hidden" id="sendPanel">
    <div class="toolbar" style="margin-top:0">
      <button class="primary" id="btnSend">요청 전송</button>
      <span class="status hidden" id="resStatus"></span>
      <span class="meta hidden" id="resMeta"></span>
    </div>
    <div class="errbox hidden" id="sendErr"></div>
    <pre id="resBox" class="hidden"></pre>
  </div>
</div>

<script src="api-form.js"></script>
</body>
</html>
